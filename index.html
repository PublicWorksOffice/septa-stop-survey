<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SEPTA — Top Stops by Ridership</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    html, body { margin: 0; height: 100%; }
    #map { position: absolute; inset: 0; }
    #panel {
      position: absolute; top: 12px; left: 12px; z-index: 1;
      background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(4px);
      padding: 12px 14px; border-radius: 8px; max-width: 260px;
      font: 13px/1.4 system-ui, sans-serif; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    #panel h1 { font-size: 14px; margin: 0 0 4px; }
    #panel p { margin: 4px 0; color: #444; }
    #status { color: #b00; }
    #search-box {
      position: absolute; top: 12px; right: 12px; z-index: 1;
      background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(4px);
      padding: 10px 12px; border-radius: 8px; width: 220px;
      font: 13px/1.4 system-ui, sans-serif; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    #search { display: flex; gap: 6px; }
    #search input {
      flex: 1; min-width: 0; padding: 6px 8px; font: inherit;
      border: 1px solid #ccc; border-radius: 6px;
    }
    #search button {
      padding: 6px 12px; font: inherit; cursor: pointer; color: #fff;
      background: #2b6cb0; border: 0; border-radius: 6px;
    }
    #search-msg { margin: 2px 0; color: #b00; min-height: 0; }
    #search-msg:empty { display: none; }
    #filter { border: 0; border-top: 1px solid #e2e2e2; margin: 8px 0 0; padding: 8px 0 0; }
    #filter legend {
      padding: 0; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.04em; color: #888;
    }
    #filter label { display: flex; align-items: center; gap: 6px; margin: 4px 0; cursor: pointer; }
    #filter input { margin: 0; }
    .legend-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .dot { border-radius: 50%; opacity: 0.9; }
    .ramp { height: 12px; border-radius: 6px; flex: 1;
            background: linear-gradient(90deg, #ffd700, #c98a3c, #5b6b7a); }

    /* District popup listing its top stops. */
    .maplibregl-popup-content { font: 13px/1.4 system-ui, sans-serif; }
    .popup-title { font-weight: 700; margin-bottom: 6px; }
    .stop-list { margin: 0; padding-left: 20px; }
    .stop-list li { margin: 3px 0; }
    .stop-list a { color: #2b6cb0; text-decoration: none; cursor: pointer; }
    .stop-list a:hover { text-decoration: underline; }

    /* Right-hand details panel (replaces the click popup). */
    #details {
      position: absolute; top: 0; right: 0; bottom: 0; z-index: 2;
      width: 340px; max-width: 85vw; background: #fff;
      box-shadow: -2px 0 10px rgba(0,0,0,0.18);
      font: 13px/1.45 system-ui, sans-serif; color: #222;
      transform: translateX(100%); transition: transform 0.2s ease;
      display: flex; flex-direction: column;
    }
    #details.open { transform: translateX(0); }
    #details header {
      padding: 14px 16px; border-bottom: 1px solid #eee;
      display: flex; align-items: flex-start; gap: 10px;
    }
    #details header h2 { font-size: 15px; margin: 0; flex: 1; }
    #details .rank { font-weight: 700; color: #b8860b; }
    #details .close {
      border: 0; background: none; font-size: 20px; line-height: 1;
      cursor: pointer; color: #888; padding: 0;
    }
    #details .body { padding: 14px 16px; overflow-y: auto; }
    #details .facts { margin: 0 0 14px; }
    #details .facts div { margin: 2px 0; color: #444; }
    #details .facts strong { color: #111; }
    #details .section-title {
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em;
      color: #888; margin: 16px 0 6px;
    }
    #details .survey { border-top: 1px dashed #ddd; padding-top: 10px; margin-top: 10px; }
    #details .survey:first-of-type { border-top: 0; padding-top: 0; margin-top: 0; }
    #details .qa { margin: 8px 0; }
    #details .qa .q { color: #666; font-size: 12px; }
    #details .qa .a { color: #111; }
    #details .none { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="panel">
    <h1>SEPTA Top Stops By Ridership (Fall 2025)</h1>
    <p>Top <strong>10</strong> stops by weekly ridership within <strong>each council
       district</strong>, across bus, trolley &amp; rail (Fall 2025).</p>
    <div class="legend-row"><span>#1</span><span class="ramp"></span><span>#10</span></div>
    <div class="legend-row"><span class="dot" style="width:16px;height:16px;border:1.5px solid #fff;display:inline-flex;align-items:center;justify-content:center;color:#000;font-size:11px;font-weight:700;line-height:1">✓</span> Has survey</div>
    <div class="legend-row"><span class="dot" style="width:16px;height:16px;background:#c98a3c;border:1.5px solid #fff"></span> Top 10 in district</div>
    <div class="legend-row"><span class="dot" style="width:16px;height:16px;background:#14b8a6;border:1.5px solid #fff"></span> Surveyed, not top 10</div>
    <div class="legend-row"><span style="width:16px;height:16px;border:1px solid #444;background:rgba(150,150,150,0.25);border-radius:2px"></span> Council district</div>
    <p id="status">Loading stops…</p>
  </div>

  <div id="search-box">
    <form id="search" autocomplete="off">
      <input id="q" type="text" inputmode="numeric" placeholder="Search by stop code…" />
      <button type="submit">Go</button>
    </form>
    <p id="search-msg"></p>
    <fieldset id="filter">
      <legend>Show</legend>
      <label><input type="radio" name="filter" value="all" checked /> All stops</label>
      <label><input type="radio" name="filter" value="top" /> Top 10 per district only</label>
      <label><input type="radio" name="filter" value="survey" /> Stops with a survey only</label>
    </fieldset>
  </div>

  <aside id="details">
    <header>
      <h2><span id="d-rank" class="rank"></span> <span id="d-name"></span></h2>
      <button class="close" id="d-close" aria-label="Close">×</button>
    </header>
    <div class="body" id="d-body"></div>
  </aside>

  <script>
    const MAPTILER_KEY = 'jYwXmpF7QofO4IU0GYmv';
    const STYLE_URL = `https://api.maptiler.com/maps/base-v4/style.json?key=${MAPTILER_KEY}`;
    // Local GeoJSON files (one per mode); all share the same schema.
    const DATA_FILES = ['bus.geojson', 'trolley.geojson', 'm1.geojson'];

    const status = document.getElementById('status');

    // Weekly ridership = boardings + alightings, with the average-weekday figure counted
    // 5× (Mon–Fri) plus the two weekend days, so weekdays and weekends aren't weighted equally.
    function ridership(p) {
      const weekday = (p.WK_Ons || 0) + (p.WK_Offs || 0);
      const saturday = (p.Sat_Ons || 0) + (p.Sat_Offs || 0);
      const sunday = (p.Sun_Ons || 0) + (p.Sun_Offs || 0);
      return weekday * 5 + saturday + sunday;
    }

    // Every loaded stop (all modes); populated once data is fetched, used by search.
    let ALL_FEATURES = [];
    let TOP_FEATURES = [];                 // the ranked top-100 features
    const topStopCodes = new Set();        // Stop_Codes present in the top 100
    // Within-district rank by platform row (FID is only unique within a file, so include Mode).
    const rankByKey = new Map();
    const rowKey = p => `${p.Mode}|${p.FID}`;

    const PER_DISTRICT = 10;   // top-N stops by ridership to show within each council district
    const topByDistrict = new Map();   // DISTRICT -> ranked top-N feature list (for district popups)

    // --- Council districts + point-in-polygon assignment ---
    let COUNCIL_FEATURES = [];   // each gets a cached _bbox: [minX, minY, maxX, maxY]

    // Even-odd ray cast across a single ring.
    function inRing(x, y, ring) {
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
        if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
      }
      return inside;
    }
    // Even-odd across a polygon's rings (outer + holes), so holes are excluded.
    function inPolygon(x, y, rings) {
      let inside = false;
      for (const ring of rings) if (inRing(x, y, ring)) inside = !inside;
      return inside;
    }
    // Returns the DISTRICT containing [lng, lat], or null.
    function districtOf(lng, lat) {
      for (const f of COUNCIL_FEATURES) {
        const bb = f._bbox;
        if (lng < bb[0] || lng > bb[2] || lat < bb[1] || lat > bb[3]) continue; // bbox reject
        const g = f.geometry;
        if (g.type === 'Polygon') {
          if (inPolygon(lng, lat, g.coordinates)) return f.properties.DISTRICT;
        } else if (g.type === 'MultiPolygon') {
          for (const poly of g.coordinates) if (inPolygon(lng, lat, poly)) return f.properties.DISTRICT;
        }
      }
      return null;
    }
    function computeBBox(geometry) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      const polys = geometry.type === 'MultiPolygon' ? geometry.coordinates : [geometry.coordinates];
      for (const poly of polys) for (const ring of poly) for (const [x, y] of ring) {
        if (x < minX) minX = x; if (x > maxX) maxX = x;
        if (y < minY) minY = y; if (y > maxY) maxY = y;
      }
      return [minX, minY, maxX, maxY];
    }

    // --- Check icon (rendered to a map image) ---
    // Bold white checkmark; reads on any dot color. Centered on surveyed stops and on
    // surveyed top-100 ridership dots alike.
    const ICON_CHECK = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24">
      <path d="M5 12.5 L10 17.5 L19 6.5" fill="none" stroke="#fff" stroke-width="3.4"
            stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;

    function addImageFromSVG(id, svg) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => { if (!map.hasImage(id)) map.addImage(id, img, { pixelRatio: 2 }); resolve(); };
        img.onerror = reject;
        img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
      });
    }
    const loadIcons = () => addImageFromSVG('check-white', ICON_CHECK);

    // --- Accessibility survey (local CSV), joined to stops by Stop_Code ---
    const SURVEY_URL = 'survey_responses.csv';
    const surveyByStopCode = new Map(); // Stop_Code (string) -> array of response objects

    // Minimal RFC-4180 CSV parser: handles quoted fields, embedded commas/newlines, "" escapes.
    function parseCSV(text) {
      const rows = [];
      let row = [], field = '', inQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const c = text[i];
        if (inQuotes) {
          if (c === '"') {
            if (text[i + 1] === '"') { field += '"'; i++; }
            else inQuotes = false;
          } else field += c;
        } else if (c === '"') inQuotes = true;
        else if (c === ',') { row.push(field); field = ''; }
        else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
        else if (c === '\r') { /* ignore */ }
        else field += c;
      }
      if (field.length || row.length) { row.push(field); rows.push(row); }
      return rows;
    }

    async function loadSurvey() {
      try {
        const res = await fetch(SURVEY_URL);
        if (!res.ok) throw new Error(res.status);
        const rows = parseCSV(await res.text());
        if (!rows.length) return;
        const header = rows[0];
        const idCol = header.findIndex(h => /bus stop id/i.test(h));
        if (idCol < 0) return;
        for (let r = 1; r < rows.length; r++) {
          const cells = rows[r];
          const code = (cells[idCol] || '').trim();
          if (!/^\d+$/.test(code)) continue; // skip "no sign", "Unknown", etc.
          const obj = {};
          header.forEach((h, i) => { obj[h.trim()] = (cells[i] || '').trim(); });
          if (!surveyByStopCode.has(code)) surveyByStopCode.set(code, []);
          surveyByStopCode.get(code).push(obj);
        }
      } catch (err) {
        console.warn('Survey data unavailable:', err);
      }
    }

    const esc = s => String(s).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));

    const map = new maplibregl.Map({
      container: 'map',
      style: STYLE_URL,
      center: [-75.27, 39.94], // Philadelphia (overridden by fitBounds once data loads)
      zoom: 10
    });
    map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

    // Council districts (polygons) drawn beneath the stops, with outline + labels.
    async function addCouncilDistricts() {
      const res = await fetch('council_districts.geojson');
      if (!res.ok) throw new Error(`council_districts: ${res.status}`);
      const geo = await res.json();
      // Cache features + bounding boxes for point-in-polygon district assignment.
      COUNCIL_FEATURES = geo.features.map(f => ({ ...f, _bbox: computeBBox(f.geometry) }));
      map.addSource('council', { type: 'geojson', data: geo });

      // Light, distinct fill per district number (1–10).
      const fillColor = [
        'match', ['get', 'DISTRICT'],
        '1', '#8dd3c7', '2', '#ffffb3', '3', '#bebada', '4', '#fb8072', '5', '#80b1d3',
        '6', '#fdb462', '7', '#b3de69', '8', '#fccde5', '9', '#bc80bd', '10', '#ccebc5',
        '#cccccc'
      ];
      map.addLayer({
        id: 'council-fill',
        type: 'fill',
        source: 'council',
        paint: { 'fill-color': fillColor, 'fill-opacity': 0.18 }
      });
      map.addLayer({
        id: 'council-line',
        type: 'line',
        source: 'council',
        paint: { 'line-color': '#444', 'line-width': 1.2, 'line-opacity': 0.6 }
      });
      map.addLayer({
        id: 'council-label',
        type: 'symbol',
        source: 'council',
        layout: {
          'text-field': ['concat', 'District ', ['get', 'DISTRICT']],
          'text-font': ['Inter Semi Bold', 'Noto Sans Semi Bold'],
          'text-size': 13
        },
        paint: { 'text-color': '#333', 'text-halo-color': '#fff', 'text-halo-width': 1.5 }
      });

      // Click a district (away from a stop dot) -> popup listing its top stops, each clickable.
      const stopLayers = () => ['stops', 'survey-stops', 'survey-icon', 'survey-badges'].filter(id => map.getLayer(id));
      map.on('click', 'council-fill', (e) => {
        // If a stop dot was clicked, let its own handler open the panel instead.
        if (map.queryRenderedFeatures(e.point, { layers: stopLayers() }).length) return;

        const d = e.features[0].properties.DISTRICT;
        const list = topByDistrict.get(d) || [];
        if (!list.length) return;
        const rows = list.map((f, i) => {
          const p = f.properties;
          return `<li><a href="#" data-i="${i}">#${p._rank} · ` +
                 `<strong>${esc(String(p.Stop_Code))}</strong> — ${esc(p.Stop)}</a></li>`;
        }).join('');
        const html = `<div class="popup-title">District ${esc(d)} · top ${list.length} by ridership</div>` +
                     `<ol class="stop-list">${rows}</ol>`;
        const popup = new maplibregl.Popup({ maxWidth: '300px' })
          .setLngLat(e.lngLat).setHTML(html).addTo(map);
        popup.getElement().querySelectorAll('a[data-i]').forEach(a => {
          a.addEventListener('click', (ev) => {
            ev.preventDefault();
            const f = list[Number(a.dataset.i)];
            highlight(f.geometry.coordinates);
            showDetails(f.properties);
          });
        });
      });
      map.on('mouseenter', 'council-fill', () => map.getCanvas().style.cursor = 'pointer');
      map.on('mouseleave', 'council-fill', () => map.getCanvas().style.cursor = '');
    }

    // Load and concatenate every mode's GeoJSON into one feature list.
    async function fetchAllFeatures() {
      const all = [];
      for (const file of DATA_FILES) {
        const res = await fetch(file);
        if (!res.ok) throw new Error(`${file}: ${res.status}`);
        const gj = await res.json();
        all.push(...(gj.features || []));
        status.textContent = `Loaded ${all.length.toLocaleString()} stops…`;
      }
      return all;
    }

    function load(allFeatures) {
      // Tag every stop with its council district and ridership, then keep the top 10
      // by ridership WITHIN each district (rank is per-district, 1..10).
      const byDistrict = new Map();
      for (const f of allFeatures) {
        const [lng, lat] = f.geometry.coordinates;
        const district = districtOf(lng, lat);
        if (district == null) continue;   // stop is outside every council district
        const tagged = { ...f, properties: { ...f.properties, _ridership: ridership(f.properties), _district: district } };
        if (!byDistrict.has(district)) byDistrict.set(district, []);
        byDistrict.get(district).push(tagged);
      }

      const features = [];
      for (const [district, arr] of byDistrict) {
        arr.sort((a, b) => b.properties._ridership - a.properties._ridership);
        const ranked = arr.slice(0, PER_DISTRICT)
          .map((f, i) => ({ ...f, properties: { ...f.properties, _rank: i + 1 } }));
        topByDistrict.set(district, ranked);
        features.push(...ranked);
      }

      const top = { type: 'FeatureCollection', features };
      TOP_FEATURES = features;
      features.forEach(f => {
        rankByKey.set(rowKey(f.properties), f.properties._rank);
        topStopCodes.add(String(f.properties.Stop_Code));
      });

      map.addSource('stops', { type: 'geojson', data: top });
      map.addLayer({
        id: 'stops',
        type: 'circle',
        source: 'stops',
        paint: {
          'circle-radius': 9,
          // Color by within-district rank: gold at #1 fading to muted slate at #10.
          'circle-color': [
            'interpolate', ['linear'], ['get', '_rank'],
            1, '#ffd700',
            PER_DISTRICT / 2, '#c98a3c',
            PER_DISTRICT, '#5b6b7a'
          ],
          'circle-opacity': 0.9,
          'circle-stroke-width': 1,
          'circle-stroke-color': '#fff'
        }
      });

      // Ring used to highlight a searched stop (empty until a search runs).
      map.addSource('search-highlight', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      map.addLayer({
        id: 'search-highlight',
        type: 'circle',
        source: 'search-highlight',
        paint: {
          'circle-radius': 15,
          'circle-color': 'rgba(0,0,0,0)',
          'circle-stroke-color': '#d7263d',
          'circle-stroke-width': 3
        }
      });

      // Fit the map to the top stops.
      const b = new maplibregl.LngLatBounds();
      features.forEach(f => b.extend(f.geometry.coordinates));
      map.fitBounds(b, { padding: 60, maxZoom: 14 });

      // Clicking a stop opens the side details panel.
      map.on('click', 'stops', (e) => showDetails(e.features[0].properties));
      map.on('mouseenter', 'stops', () => map.getCanvas().style.cursor = 'pointer');
      map.on('mouseleave', 'stops', () => map.getCanvas().style.cursor = '');

      status.style.color = '#444';
      status.textContent = `Top ${PER_DISTRICT} stops by ridership in each of ${byDistrict.size} districts.`;
    }

    // --- Details side panel ---
    const detailsEl = document.getElementById('details');
    document.getElementById('d-close').onclick = () => detailsEl.classList.remove('open');

    function renderSurvey(code) {
      const responses = surveyByStopCode.get(String(code)) || [];
      if (!responses.length) {
        return `<div class="section-title">Accessibility survey</div>` +
               `<div class="none">No survey responses on file for stop ${esc(code)}.</div>`;
      }
      const label = responses.length === 1 ? '1 response' : `${responses.length} responses`;
      const blocks = responses.map(r => {
        // Show every answered question (blank station-audit columns are skipped automatically).
        const qa = Object.entries(r)
          .filter(([q, a]) => a && !/^bus stop id/i.test(q))
          .map(([q, a]) => `<div class="qa"><div class="q">${esc(q)}</div><div class="a">${esc(a)}</div></div>`)
          .join('');
        return `<div class="survey">${qa}</div>`;
      }).join('');
      return `<div class="section-title">Accessibility survey · ${label}</div>${blocks}`;
    }

    function showDetails(p) {
      // Top-10-per-district stops carry _rank; others don't.
      document.getElementById('d-rank').textContent = p._rank ? `#${p._rank}` : '';
      document.getElementById('d-name').textContent = p.Stop;
      const districtLine = p._district != null
        ? `<div>Council district <strong>${esc(p._district)}</strong></div>`
        : `<div>Outside the council districts</div>`;
      const rankLine = p._rank
        ? `<div>Ridership rank: <strong>#${p._rank}</strong> of ${PER_DISTRICT} in district ${esc(p._district)}</div>`
        : `<div>Not a top-${PER_DISTRICT} stop in its district</div>`;
      document.getElementById('d-body').innerHTML =
        `<div class="facts">` +
          `<div>${esc(p.Mode)} · Route <strong>${esc(p.Route)}</strong> · ${esc(p.Direction)}</div>` +
          `<div>Stop code <strong>${esc(p.Stop_Code)}</strong></div>` +
          `<div>Weekly ridership: <strong>${Number(p._ridership).toLocaleString()}</strong></div>` +
          districtLine +
          rankLine +
        `</div>` +
        renderSurvey(p.Stop_Code);
      detailsEl.classList.add('open');
    }

    // Render surveyed stops:
    //  - surveyed but NOT in the top 100  -> teal dot with a white checkmark icon
    //  - surveyed AND in the top 100      -> keep the ridership dot, add a white checkmark inside
    function addSurveyedStops(allFeatures) {
      if (!surveyByStopCode.size) return;

      // Surveyed-only stops: one point per code, excluding any that are top-100 stops.
      const seen = new Set();
      const surveyOnly = [];
      for (const f of allFeatures) {
        const code = String(f.properties.Stop_Code);
        if (!surveyByStopCode.has(code) || topStopCodes.has(code) || seen.has(code)) continue;
        seen.add(code);
        surveyOnly.push({ ...f, properties: { ...f.properties, _ridership: ridership(f.properties) } });
      }

      // Top-100 stops that were surveyed (these get a badge); one point per code.
      const seenBadge = new Set();
      const badges = [];
      for (const f of TOP_FEATURES) {
        const code = String(f.properties.Stop_Code);
        if (!surveyByStopCode.has(code) || seenBadge.has(code)) continue;
        seenBadge.add(code);
        badges.push(f); // already carries _rank and _ridership
      }

      if (surveyOnly.length) {
        map.addSource('survey-stops', { type: 'geojson', data: { type: 'FeatureCollection', features: surveyOnly } });
        map.addLayer({
          id: 'survey-stops',
          type: 'circle',
          source: 'survey-stops',
          paint: {
            'circle-radius': 9,            // same size as the ridership dots
            'circle-color': '#14b8a6',   // teal — distinct from the gold→slate ridership scale
            'circle-opacity': 0.95,
            'circle-stroke-width': 1.5,
            'circle-stroke-color': '#fff'
          }
        });
        map.addLayer({
          id: 'survey-icon',
          type: 'symbol',
          source: 'survey-stops',
          layout: {
            'icon-image': 'check-white',
            'icon-size': 0.85,
            'icon-allow-overlap': true,
            'icon-ignore-placement': true
          }
        });
        for (const id of ['survey-stops', 'survey-icon']) {
          map.on('click', id, (e) => showDetails(e.features[0].properties));
          map.on('mouseenter', id, () => map.getCanvas().style.cursor = 'pointer');
          map.on('mouseleave', id, () => map.getCanvas().style.cursor = '');
        }
      }

      if (badges.length) {
        map.addSource('survey-badges', { type: 'geojson', data: { type: 'FeatureCollection', features: badges } });
        map.addLayer({
          id: 'survey-badges',
          type: 'symbol',
          source: 'survey-badges',
          layout: {
            'icon-image': 'check-white',   // white checkmark centered inside the ridership dot
            'icon-size': 0.85,
            'icon-allow-overlap': true,
            'icon-ignore-placement': true
          }
        });
        map.on('click', 'survey-badges', (e) => showDetails(e.features[0].properties));
        map.on('mouseenter', 'survey-badges', () => map.getCanvas().style.cursor = 'pointer');
        map.on('mouseleave', 'survey-badges', () => map.getCanvas().style.cursor = '');
      }
    }

    // --- Show filter (radio) ---
    // all   -> top-100 dots + surveyed-only dots + surveyed top-stop checkmarks
    // top   -> top-100 dots only
    // survey-> any stop with a survey (surveyed-only dots + surveyed top-stop dots)
    // both  -> stops that are surveyed AND in the top 100
    function applyFilter(mode) {
      const setVis = (id, on) => { if (map.getLayer(id)) map.setLayoutProperty(id, 'visibility', on ? 'visible' : 'none'); };
      const surveyedNums = [...surveyByStopCode.keys()].map(Number);
      const onlySurveyed = ['in', ['get', 'Stop_Code'], ['literal', surveyedNums]];

      if (map.getLayer('stops')) {
        // Restrict the top-100 dots to surveyed stops when the mode is survey-scoped.
        map.setFilter('stops', (mode === 'survey' || mode === 'both') ? onlySurveyed : null);
      }
      // Surveyed-only (non-top-100) dots show only for "all" and "with a survey only".
      const showSurveyOnly = (mode === 'all' || mode === 'survey');
      setVis('survey-stops', showSurveyOnly);
      setVis('survey-icon', showSurveyOnly);
      // Clipboards sit on surveyed top-100 stops, which are shown in every mode.
      setVis('survey-badges', true);
    }

    document.getElementById('filter').addEventListener('change', (e) => {
      if (e.target.name === 'filter') applyFilter(e.target.value);
    });

    // --- Search by stop code (across all loaded stops, not just the top 100) ---
    const searchMsg = document.getElementById('search-msg');

    function highlight(coords) {
      map.getSource('search-highlight').setData({
        type: 'FeatureCollection',
        features: [{ type: 'Feature', geometry: { type: 'Point', coordinates: coords }, properties: {} }]
      });
    }

    document.getElementById('search').addEventListener('submit', (e) => {
      e.preventDefault();
      const q = document.getElementById('q').value.trim();
      searchMsg.textContent = '';
      if (!ALL_FEATURES.length) { searchMsg.textContent = 'Still loading…'; return; }
      if (!/^\d+$/.test(q)) { searchMsg.textContent = 'Enter a numeric stop code.'; return; }

      // A code can have several platform rows; show the busiest as the representative.
      const matches = ALL_FEATURES
        .filter(f => String(f.properties.Stop_Code) === q)
        .map(f => ({ ...f, properties: { ...f.properties, _ridership: ridership(f.properties) } }))
        .sort((a, b) => b.properties._ridership - a.properties._ridership);

      if (!matches.length) { searchMsg.textContent = `No stop with code ${q}.`; return; }

      const rep = matches[0];
      const [lng, lat] = rep.geometry.coordinates;
      rep.properties._district = districtOf(lng, lat);          // null if outside all districts
      rep.properties._rank = rankByKey.get(rowKey(rep.properties)); // undefined if not a top-10 district stop
      highlight(rep.geometry.coordinates);
      map.flyTo({ center: rep.geometry.coordinates, zoom: 15 });
      showDetails(rep.properties);
    });

    map.on('load', async () => {
      try {
        const [allFeatures] = await Promise.all([fetchAllFeatures(), loadSurvey(), loadIcons()]);
        await addCouncilDistricts();   // add first so districts render beneath the stops
        ALL_FEATURES = allFeatures;
        load(allFeatures);
        addSurveyedStops(allFeatures);
        applyFilter(document.querySelector('input[name="filter"]:checked').value);
      } catch (err) {
        console.error(err);
        status.textContent = 'Error: ' + err.message;
      }
    });
  </script>
</body>
</html>
